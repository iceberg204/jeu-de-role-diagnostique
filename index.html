<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jeu de rôle – décision clinique</title>

<style>
:root{
  --text:#0b1b2b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  color:var(--text);

  background:
    radial-gradient(900px 600px at 20% 10%, rgba(255,255,255,.9), transparent 60%),
    radial-gradient(700px 500px at 80% 20%, rgba(220,240,255,.9), transparent 60%),
    linear-gradient(180deg,#6bb6ff,#dff1ff);

  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  text-align:center;
  max-width:650px;
  padding:40px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(8px);
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}

h1{
  margin:0 0 8px;
  font-size:28px;
}

.subtitle{
  font-size:14px;
  opacity:.7;
  margin-bottom:25px;
}

p{
  line-height:1.6;
}

.choices{
  margin-top:25px;
  display:grid;
  gap:12px;
}

button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:#ffffff;
  cursor:pointer;
  font-size:15px;
  transition:transform .15s ease, box-shadow .15s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.screen{
  transition:opacity .4s ease, transform .4s ease;
}

.hidden{
  opacity:0;
  transform:translateY(-20px);
  pointer-events:none;
}

.final{
  display:none;
  font-size:26px;
  font-weight:500;
  animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<div id="question" class="screen">

<h1>Décision aux urgences</h1>
<div class="subtitle">Service d'orthopédie</div>

<p>
Un patient âgé atteint de démence arrive avec une fracture du col du fémur.
</p>

<p>
Que faites‑vous ?
</p>

<div class="choices">
<button onclick="choose()">Opérer</button>
<button onclick="choose()">Ne pas opérer</button>
<button onclick="choose()">Attendre</button>
</div>

</div>

<div id="final" class="final">
Pour aller plus loin, lisez le travail afin d'explorer la réflexion éthique approfondie que soulève ce choix.
</div>

</div>

<script>

function choose(){

const q = document.getElementById("question");
const f = document.getElementById("final");

q.classList.add("hidden");

setTimeout(()=>{
q.style.display="none";
f.style.display="block";
},400);

}

</script>

</body>
</html>
